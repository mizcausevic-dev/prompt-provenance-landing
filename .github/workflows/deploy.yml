name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: FTP-sync static site to prompts.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify site root contains Prompt Provenance landing
        run: |
          test -f index.html || (echo "FAIL: no index.html at repo root" && exit 1)
          grep -q "Prompt Provenance" index.html || (echo "FAIL: index.html does not mention Prompt Provenance" && exit 1)
          echo "OK: site root verified"
          ls -lah

      - name: FTP-Deploy to /prompts/ (first attempt)
        id: deploy
        timeout-minutes: 5
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./
          server-dir: /prompts/
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            **/README.md
            **/LICENSE

      - name: Retry FTP-Deploy if first attempt failed
        if: steps.deploy.outcome == 'failure'
        timeout-minutes: 5
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          timeout: 90000
          local-dir: ./
          server-dir: /prompts/
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            **/README.md
            **/LICENSE
